services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: karaoke_place
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    working_dir: /src
    volumes:
      - .:/src
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "Host=db;Database=karaoke_place;Username=postgres;Password=postgres"
      ASPNETCORE_ENVIRONMENT: Development
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
